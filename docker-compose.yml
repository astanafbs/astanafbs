services:
  postgres:
    image: postgres:16-alpine
    container_name: fbs_astana_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fbs_astana}
      POSTGRES_USER: ${POSTGRES_USER:-fbs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fbs_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fbs} -d ${POSTGRES_DB:-fbs_astana}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: fbs_astana_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fbsminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fbsminio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: fbs_astana_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-fbsminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fbsminio123}
      MINIO_BUCKET: ${MINIO_BUCKET:-fbs-astana}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc anonymous set none local/$$MINIO_BUCKET;
      "

  adminer:
    image: adminer:4
    container_name: fbs_astana_adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: fbs_astana_api
    profiles: ["app"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      API_PORT: 3000
      API_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-fbs}:${POSTGRES_PASSWORD:-fbs_password}@postgres:5432/${POSTGRES_DB:-fbs_astana}
      ALLOW_DEV_AUTH: ${ALLOW_DEV_AUTH:-true}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-dev-admin-token}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-fbsminio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-fbsminio123}
      S3_BUCKET: ${S3_BUCKET:-fbs-astana}
    ports:
      - "${API_PORT:-3000}:3000"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: fbs_astana_admin
    profiles: ["app"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      API_INTERNAL_URL: http://api:3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-dev-admin-token}
    ports:
      - "${ADMIN_PORT:-3001}:3001"

volumes:
  postgres_data:
  minio_data:
